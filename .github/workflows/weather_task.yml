name: Update Weather Page

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # Added requests just in case it isn't in your requirements.txt
        run: |
          pip install -r requirements.txt 
          pip install requests pandas groq tabulate 

      - name: Fetch Weather Data
        run: python fetch.py

      - name: Run Weather Poem Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python write_poem.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html weather.db
          git commit -m "Auto-update weather page and database" || echo "No changes to commit"
          git push
