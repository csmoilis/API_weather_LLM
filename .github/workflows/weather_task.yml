name: Update Weather Page

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial for allowing the bot to commit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests groq jinja2  # Add jinja2 if you use templates

      - name: Run Weather Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python weather_poem.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "Auto-update weather page" || echo "No changes to commit"
          git push